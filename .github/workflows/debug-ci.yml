name: Debug CI

on:
  push:
    branches: [main]

permissions:
  issues: write

jobs:
  debug-cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            build-essential cmake pkg-config
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good
            cppcheck
          version: 1.0

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DGST_METADATA_BUILD_EXAMPLES=ON
          -DGST_METADATA_BUILD_TESTS=ON

      - name: Run cppcheck and create issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT=$(cppcheck \
            --project=build/compile_commands.json \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=noExplicitConstructor 2>&1 | head -200)
          VERSION=$(cppcheck --version)
          BODY="$VERSION

          \`\`\`
          $OUTPUT
          \`\`\`"
          gh issue create --title "Debug: cppcheck output" --body "$BODY" --label "debug" || true

  debug-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git make
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gstreamer mingw-w64-x86_64-gst-plugins-base

      - name: Debug configure and create issue
        shell: msys2 {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          OUTPUT=$(cmake -B build -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGST_METADATA_BUILD_EXAMPLES=ON \
            -DGST_METADATA_BUILD_TESTS=ON 2>&1)
          EXIT_CODE=$?
          ERROR_LOG=""
          if [ -f build/CMakeFiles/CMakeError.log ]; then
            ERROR_LOG=$(head -200 build/CMakeFiles/CMakeError.log)
          fi
          BODY="cmake exit: $EXIT_CODE

          cmake: $(cmake --version | head -1)
          gcc: $(gcc -dumpversion)
          pkg-config gstreamer: $(pkg-config --modversion gstreamer-1.0 2>&1)

          **cmake output:**
          \`\`\`
          $OUTPUT
          \`\`\`

          **CMakeError.log:**
          \`\`\`
          $ERROR_LOG
          \`\`\`"
          gh issue create --title "Debug: Windows cmake output" --body "$BODY" --label "debug" || true
