name: Debug CI

on:
  push:
    branches: [main]

jobs:
  debug-cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            build-essential cmake pkg-config
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good
            cppcheck
          version: 1.0

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DGST_METADATA_BUILD_EXAMPLES=ON
          -DGST_METADATA_BUILD_TESTS=ON

      - name: Run cppcheck verbose
        run: |
          cppcheck --version
          echo "=== project scan ==="
          cppcheck \
            --project=build/compile_commands.json \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=noExplicitConstructor 2>&1 | head -100
          echo "=== exit code: $? ==="

  debug-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git make
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gstreamer mingw-w64-x86_64-gst-plugins-base

      - name: Debug configure (allow failure)
        shell: msys2 {0}
        run: |
          set +e
          echo "=== Environment ==="
          which cmake && cmake --version
          which pkg-config && pkg-config --version
          which gcc && gcc --version | head -1
          which make && make --version | head -1
          echo "=== pkg-config gstreamer ==="
          pkg-config --cflags --libs gstreamer-1.0 gstreamer-base-1.0
          echo "=== PWD and ls ==="
          pwd
          ls -la
          echo "=== cmake configure ==="
          cmake -B build -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGST_METADATA_BUILD_EXAMPLES=ON \
            -DGST_METADATA_BUILD_TESTS=ON 2>&1
          CMAKE_EXIT=$?
          echo "=== cmake exit code: $CMAKE_EXIT ==="
          if [ $CMAKE_EXIT -ne 0 ] && [ -f build/CMakeFiles/CMakeError.log ]; then
            echo "=== CMakeError.log ==="
            cat build/CMakeFiles/CMakeError.log
          fi
          if [ -f build/CMakeFiles/CMakeOutput.log ]; then
            echo "=== CMakeOutput.log (last 50 lines) ==="
            tail -50 build/CMakeFiles/CMakeOutput.log
          fi
