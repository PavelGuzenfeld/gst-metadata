name: Debug CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            build-essential cmake pkg-config
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good
            cppcheck
          version: 1.0
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DGST_METADATA_BUILD_EXAMPLES=ON -DGST_METADATA_BUILD_TESTS=ON
      - name: Run cppcheck and push
        run: |
          {
            cppcheck --version
            echo "---"
            cppcheck \
              --project=build/compile_commands.json \
              --enable=warning,style,performance \
              --suppress=missingIncludeSystem \
              --suppress=unusedFunction \
              --suppress=noExplicitConstructor \
              --suppress=unknownMacro \
              --suppress=uninitMemberVar \
              --suppress=duplicateInheritedMember \
              -i build/_deps 2>&1 | head -100
          } > /tmp/out.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B debug-output
          cp /tmp/out.txt debug-cppcheck-output.txt
          git add debug-cppcheck-output.txt
          git commit -m "cppcheck output"
          git push origin debug-output --force

  debug-win:
    runs-on: windows-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2 mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
      - name: Debug and push
        shell: msys2 {0}
        run: |
          set +e
          {
            echo "cmake: $(cmake --version | head -1)"
            echo "ninja: $(ninja --version 2>&1)"
            echo "gcc: $(gcc -dumpversion)"
            cmake --help | grep -i 'ninja\|make\|msys\|mingw' || true
            echo "---"
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DGST_METADATA_BUILD_EXAMPLES=ON \
              -DGST_METADATA_BUILD_TESTS=ON 2>&1
            echo "exit: $?"
            if [ -f build/CMakeFiles/CMakeError.log ]; then
              head -100 build/CMakeFiles/CMakeError.log
            fi
          } > /tmp/out.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin debug-output
          git checkout debug-output
          cp /tmp/out.txt debug-windows-output.txt
          git add debug-windows-output.txt
          git commit -m "windows output"
          git push origin debug-output --force
