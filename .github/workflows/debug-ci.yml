name: Debug CI

on:
  push:
    branches: [main]

jobs:
  debug-cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            build-essential cmake pkg-config
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good
            cppcheck
          version: 1.0

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DGST_METADATA_BUILD_EXAMPLES=ON
          -DGST_METADATA_BUILD_TESTS=ON

      - name: Run cppcheck (verbose)
        run: |
          echo "=== cppcheck version ===" | tee output.txt
          cppcheck --version | tee -a output.txt
          echo "" | tee -a output.txt
          echo "=== With --project ===" | tee -a output.txt
          cppcheck --project=build/compile_commands.json \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=noExplicitConstructor \
            --force 2>&1 | tee -a output.txt || true
          echo "" | tee -a output.txt
          echo "=== Direct file scan ===" | tee -a output.txt
          find include examples -name '*.hpp' -o -name '*.cpp' | \
          xargs cppcheck \
            --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I include -I examples/include \
            $(pkg-config --cflags gstreamer-1.0 gstreamer-base-1.0 | tr ' ' '\n' | grep '^-I' | tr '\n' ' ') \
            --force 2>&1 | tee -a output.txt || true

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-output
          path: output.txt

  debug-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git make
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gstreamer mingw-w64-x86_64-gst-plugins-base

      - name: Debug configure
        shell: msys2 {0}
        run: |
          echo "=== which cmake ===" | tee output.txt
          which cmake | tee -a output.txt
          echo "=== cmake version ===" | tee -a output.txt
          cmake --version | tee -a output.txt
          echo "=== which pkg-config ===" | tee -a output.txt
          which pkg-config | tee -a output.txt
          echo "=== pkg-config gstreamer ===" | tee -a output.txt
          pkg-config --cflags --libs gstreamer-1.0 gstreamer-base-1.0 2>&1 | tee -a output.txt
          echo "=== which gcc ===" | tee -a output.txt
          which gcc | tee -a output.txt
          gcc --version | head -1 | tee -a output.txt
          echo "=== which make ===" | tee -a output.txt
          which make | tee -a output.txt
          echo "=== cmake configure ===" | tee -a output.txt
          cmake -B build -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGST_METADATA_BUILD_EXAMPLES=ON \
            -DGST_METADATA_BUILD_TESTS=ON 2>&1 | tee -a output.txt || true

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-debug-output
          path: output.txt
